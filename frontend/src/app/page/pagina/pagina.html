
<div class="incio-container">
  <div class="welcome-card">
    <div class="welcome-header">
      <div class="avatar">
        {{ usuario?.nombre?.charAt(0).toUpperCase()}}
     </div>
     <div class="welcome-text">
      <h2>Bienvenido, {{ usuario?.nombre }}</h2>
      <p class="rol-badge"> {{ usuario?.rol_nombre|| usuario?.rol }} </p>
     </div>
    </div>

    <div class="info-section"  *ngIf="usuario?. permisos && usuario.permisos.length > 0 ">
      <h3><i class="bi bbi-shield-check"></i> Tus permisos</h3>
      <div class="permiso-grid">
        <div class="permiso-badge" *ngFor="let permiso of usuario?.permisos">
          <i class="bi bi-check-circle-fill"></i>
          {{permiso}}
        </div>
      </div>
    </div>

    <div class="quick-actions">
      <h3><i class="bi bi-lightning-charge"></i> Acciones Rapidas</h3>
      <a routerLink="/perfil"  class="action-btn">
        <i class="bi bi-person-circle"></i>
        <span>Mi Perfil</span>
      </a>
       </div>
    </div>
  </div>
